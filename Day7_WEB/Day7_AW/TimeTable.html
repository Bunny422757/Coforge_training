<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TimeTable</title>
<link href="TTStyle.css" rel="stylesheet">
</head>
<body>
	<table border="1">
		<tr>
			<th colspan="6">Time Table</th>
		</tr>
		<tr>
			<th rowspan="6" style="vertical-align: middle;">Hours</th>
			<th>Mon</th>
			<th>Tue</th>
			<th>Wed</th>
			<th>Thu</th>
			<th>Fri</th>
		</tr>
		<tr>
			<td>Science</td>
			<td>Maths</td>
			<td>Science</td>
			<td>Maths</td>
			<td>Arts</td>
		</tr>
		<tr>
			<td>Science</td>
			<td>Maths</td>
			<td>Science</td>
			<td>Maths</td>
			<td>Arts</td>
		</tr>
		<tr>
			<th colspan="5">LUNCH</th>
		</tr>
		<tr>
			<td>Science</td>
			<td>Maths</td>
			<td>Science</td>
			<td>Maths</td>
			<td rowspan="2">Project</td>
		</tr>
		<tr>
			<td>Science</td>
			<td>Maths</td>
			<td>Science</td>
			<td>Maths</td>
		</tr>
	</table>
</body>
</html>
